<!DOCTYPE html>
<html>
<head>
  <title>Login Form 2</title>
</head>
<body>

  <h2>Form Login 2</h2>

  <form onsubmit="handleSubmit(event)">
    
    <label>First Name:</label>
    <input type="text" name="First Name" id="firstName" required><br><br>

    <label>Last Name:</label>
    <input type="text" name="Last Name" id="lastName" required><br><br>

    <label>Phone Number:</label>
    <input type="text" name="Phone Number" id="phone" required><br><br>

    <label>Email ID:</label>
    <input type="email" name="Email ID" id="email" required><br><br>

    <button type="submit">Submit</button>
  </form>

  <script>
    function handleSubmit(event) {
      event.preventDefault(); // stop page reload

      const firstName = document.getElementById("firstName").value;
      const lastName = document.getElementById("lastName").value;
      const phone = document.getElementById("phone").value;
      const email = document.getElementById("email").value;

      alert(
        "First Name: " + firstName +
        " Last Name: " + lastName +
        " Phone Number: " + phone +
        " Email ID: " + email
      );
    }
  </script>

</body>
</html>
